version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edinz-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend/edinz_quiz.sqlite:/app/edinz_quiz.sqlite
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edinz-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
