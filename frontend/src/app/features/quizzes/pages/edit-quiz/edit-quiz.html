<div class="page-container">
  <div class="header-row">
    <div class="header-left">
      <a routerLink="/admin" class="back-link">
        <mat-icon>arrow_back</mat-icon> Back to Dashboard
      </a>
      <h2 class="title">✏️ Edit Quiz: {{ quiz()?.quizTitle }}</h2>
      <span class="course-badge">Course: {{ quiz()?.course?.courseName }}</span>
    </div>

    <!-- Autosave status info indicator -->
    <div class="autosave-status" *ngIf="isAutosaving() || lastAutosavedTime()">
      <span class="pulse-dot" *ngIf="isAutosaving()"></span>
      <span class="status-text">{{ isAutosaving() ? 'Saving changes...' : lastAutosavedTime() }}</span>
    </div>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <mat-tab-group animationDuration="250ms">
        
        <!-- Details & Settings Tab -->
        <mat-tab label="⚙️ Settings & Configuration">
          <div class="tab-content">
            <form [formGroup]="quizForm" (ngSubmit)="onSubmit()">
              
              <h3 class="tab-section-heading">Basic Info</h3>
              <app-quiz-form [parentForm]="quizForm"></app-quiz-form>

              <h3 class="tab-section-heading">Parameters & Controls</h3>
              <app-quiz-settings [parentForm]="quizForm"></app-quiz-settings>

              <div *ngIf="errorMessage()" class="error-banner">
                ⚠️ {{ errorMessage() }}
              </div>

              <div class="actions-footer">
                <button mat-raised-button color="primary" type="submit" [disabled]="isSaving()">
                  {{ isSaving() ? 'Saving Configuration...' : 'Save Settings' }}
                </button>
              </div>
            </form>
          </div>
        </mat-tab>

        <!-- Question Linkages Tab -->
        <mat-tab label="❓ Link Questions Bank">
          <div class="tab-content question-tab-grid">
            
            <!-- Left: assigned questions list -->
            <div class="assigned-col">
              <app-selected-questions 
                [questions]="assignedQuestions()"
                (removeQuestion)="removeQuestion($event)"
                (reorder)="reorderQuestions($event)"
                (marksChanged)="updateQuestionMarks($event)">
              </app-selected-questions>
            </div>

            <!-- Right: browse/select from Question Bank -->
            <div class="selector-col" *ngIf="quiz() && quiz()!.courseId">
              <app-question-selector 
                [courseId]="quiz()!.courseId!"
                [linkedQuestionIds]="linkedQuestionIds()"
                (addSelectedQuestions)="addQuestions($event)">
              </app-question-selector>
            </div>

          </div>
        </mat-tab>

      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</div>
