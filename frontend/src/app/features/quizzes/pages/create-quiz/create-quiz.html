<div class="page-container">
  <div class="header-row">
    <div class="header-left">
      <a routerLink="/admin" class="back-link">
        <mat-icon>arrow_back</mat-icon> Back to Dashboard
      </a>
      <h2 class="title">✨ Create Quiz Draft</h2>
    </div>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="quizForm" (ngSubmit)="onSubmit()">
        <mat-tab-group animationDuration="250ms">
          
          <!-- Metadata Tab -->
          <mat-tab label="1. Basic Details">
            <div class="tab-content">
              <app-quiz-form [parentForm]="quizForm"></app-quiz-form>
            </div>
          </mat-tab>

          <!-- Settings Tab -->
          <mat-tab label="2. Settings & Behaviors">
            <div class="tab-content">
              <app-quiz-settings [parentForm]="quizForm"></app-quiz-settings>
            </div>
          </mat-tab>

        </mat-tab-group>

        <div *ngIf="errorMessage()" class="error-banner">
          ⚠️ {{ errorMessage() }}
        </div>

        <div class="actions-footer">
          <button mat-button type="button" routerLink="/admin">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="isSaving()">
            {{ isSaving() ? 'Saving Draft...' : 'Save & Link Questions' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
