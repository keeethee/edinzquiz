<div class="page-container grid-layout">
  
  <!-- Left Side: Create Assignment Form -->
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>✨ Deploy New Assignment</mat-card-title>
    </mat-card-header>
    <mat-card-content class="form-content">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Target Course Context</mat-label>
        <mat-select [value]="selectedCourseId()" (selectionChange)="onCourseChange($event.value)">
          <mat-option *ngFor="let course of courses()" [value]="course.id">
            {{ course.courseName }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Assignment Title</mat-label>
        <input matInput [(ngModel)]="newTitle" placeholder="e.g. Docker Compose Multi-container deployment" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Description & Guidelines</mat-label>
        <textarea matInput [(ngModel)]="newDescription" rows="4" placeholder="Enter links, criteria, and requirements..."></textarea>
      </mat-form-field>

      <div>
        <label style="display: block; font-size: 0.8rem; font-weight: 550; color: #a3a3a3; margin-bottom: 0.25rem;">Submission Deadline</label>
        <input type="datetime-local" class="neo-datetime-input" [(ngModel)]="newDeadline" />
      </div>

      <button mat-raised-button color="primary" class="full-width" (click)="createAssignment()" style="margin-top: 1rem;">
        🚀 Deploy Assignment
      </button>
    </mat-card-content>
  </mat-card>

  <!-- Right Side: Active Assignments List -->
  <mat-card class="list-card">
    <mat-card-header>
      <mat-card-title>📝 Active Course Assignments</mat-card-title>
    </mat-card-header>
    <mat-card-content class="list-content">
      <div *ngFor="let item of assignments()" class="assignment-row">
        <div class="assignment-info">
          <h3 class="assignment-title">{{ item.title }}</h3>
          <p class="description" *ngIf="item.description">{{ item.description }}</p>
          <div class="meta-row">
            <span class="deadline">📅 Deadline: {{ item.deadline | date:'short' }}</span>
          </div>
        </div>

        <div class="actions">
          <button mat-icon-button color="warn" (click)="deleteAssignment(item.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </div>

      <div *ngIf="assignments().length === 0" class="empty-state">
        No assignments created for this course yet.
      </div>
    </mat-card-content>
  </mat-card>

</div>
